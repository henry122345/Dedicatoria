<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Ti ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
}

.estrellas{
position:absolute;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:mover 80s linear infinite;
opacity:.5;
}

@keyframes mover{
from{background-position:0 0;}
to{background-position:1000px 1000px;}
}

.contenedor{
position:relative;
text-align:center;
color:white;
z-index:2;
padding:20px;
}

.corazon{
font-size:90px;
animation:latido 1s infinite;
}

@keyframes latido{
0%,100%{transform:scale(1);}
50%{transform:scale(1.2);}
}

h1{
margin-top:20px;
font-size:38px;
text-shadow:0 0 15px #ff4d6d;
}

p{
margin-top:20px;
font-size:22px;
max-width:700px;
line-height:1.6;
}

button{
margin-top:35px;
padding:15px 35px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1744;
}
</style>
</head>

<body>

<div class="estrellas"></div>

<div class="contenedor">

<div class="corazon">❤️</div>

<h1>Yo te esperaré hasta que estés lista</h1>

<p>
No importa cuánto tiempo pase.<br><br>

Mi cariño por ti sigue aquí, esperando con paciencia,
sin presiones y con la esperanza de que algún día nuestros caminos se unan.
Mientras llega ese momento, seguiré aquí, pensando en ti.
❤️
</p>

<button onclick="window.open('https://open.spotify.com/track/3qAJAUr7yc9bPDx4ESt6ND','_blank')">
🎵 Escuchar nuestra canción
</button>

</div>

</body>
</html>
